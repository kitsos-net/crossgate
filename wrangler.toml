name = "crossgate"
main               = "worker.js"
compatibility_date = "2025-01-01"

# ─── KV Namespace ────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id      = "2baf32ee964d4c3eb74bb6e435036e6f"

# ─── Public env vars ─────────────────────────────────────────────────────────
[vars]
WORKER_BASE_URL = "https://crossgate.kitsos.net"
UPSTREAM_ISSUER = "https://auth.kitsos.net"

# Optional: explizite Endpoint-Overrides (Standard: {ISSUER}/authorize und {ISSUER}/oauth/token)
# UPSTREAM_AUTH_ENDPOINT  = "https://..."
# UPSTREAM_TOKEN_ENDPOINT = "https://..."

# ─── Secrets (niemals im plaintext hier eintragen!) ──────────────────────────
# Setzen via CLI:
#
#   wrangler secret put UPSTREAM_CLIENT_ID
#   wrangler secret put UPSTREAM_CLIENT_SECRET
#   wrangler secret put LOGOUT_URL
#
# UPSTREAM_CLIENT_ID      = Worker's client_id beim Upstream-OIDC-Provider
# UPSTREAM_CLIENT_SECRET  = Worker's client_secret
# LOGOUT_URL              = z.B. https://auth.kitsos.net/logout
